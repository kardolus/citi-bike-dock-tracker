# Vélib' (Vélib' Métropole, Paris region) — full per-city stack, cloned from cabi.
# DB-per-city: host TimescaleDB velib-postgres on 10.0.0.120:5440.
apiVersion: v1
kind: Namespace
metadata: {name: velib, labels: {kardol.us/group: apps}}
---
apiVersion: v1
kind: Service
metadata: {name: velib-postgres, namespace: velib}
spec:
  type: ClusterIP
  ports: [{name: pg, port: 5432, targetPort: 5440, protocol: TCP}]
---
apiVersion: v1
kind: Endpoints
metadata: {name: velib-postgres, namespace: velib}
subsets:
  - addresses: [{ip: 10.0.0.120}]
    ports: [{name: pg, port: 5440, protocol: TCP}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: dockscan, namespace: velib, labels: {app: dockscan}}
spec:
  replicas: 1
  selector: {matchLabels: {app: dockscan}}
  template:
    metadata: {labels: {app: dockscan}}
    spec:
      imagePullSecrets: [{name: ghcr-pull}]
      containers:
        - name: dockscan
          image: ghcr.io/kardolus/citi-bike-dock-tracker:v9
          imagePullPolicy: IfNotPresent
          args: ["ts", "--interval", "180", "--postgres", "--metrics-addr", ":2112"]
          ports: [{containerPort: 2112, name: metrics}]
          env:
            - {name: CITY_ID, value: paris}
            - {name: GBFS_STATION_INFORMATION_URL, value: "https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole/station_information.json"}
            - {name: GBFS_STATION_STATUS_URL, value: "https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole/station_status.json"}
            - {name: NEIGHBORHOODS_PATH, value: /config/neighborhoods.json}
            - {name: USER_AGENT, value: "velib-bikeshare-tracker/1.0 (+https://velib.kardol.us; unofficial, public GBFS)"}
            - name: DATABASE_URL
              valueFrom: {secretKeyRef: {name: velib-db, key: DATABASE_URL}}
          volumeMounts:
            - {name: neighborhoods, mountPath: /config/neighborhoods.json, subPath: neighborhoods.json}
          readinessProbe: {httpGet: {path: /ready, port: 2112}, initialDelaySeconds: 10, periodSeconds: 15}
          livenessProbe: {httpGet: {path: /healthz, port: 2112}, initialDelaySeconds: 10, periodSeconds: 20}
          resources: {requests: {cpu: 25m, memory: 32Mi}, limits: {memory: 128Mi}}
      volumes:
        - {name: neighborhoods, configMap: {name: velib-neighborhoods}}
---
apiVersion: v1
kind: Service
metadata: {name: dockscan, namespace: velib, labels: {app: dockscan}}
spec:
  selector: {app: dockscan}
  ports: [{name: metrics, port: 2112, targetPort: 2112}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: velib-web, namespace: velib, labels: {app: velib-web}}
spec:
  replicas: 1
  selector: {matchLabels: {app: velib-web}}
  template:
    metadata: {labels: {app: velib-web}}
    spec:
      imagePullSecrets: [{name: ghcr-pull}]
      containers:
        - name: velib-web
          image: ghcr.io/kardolus/citibike-web:v58
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8000, name: http}]
          env:
            - {name: CITY_ID, value: paris}
            - {name: BRAND, value: "Vélib'"}
            - {name: DOMAIN, value: velib.kardol.us}
            - {name: CITY_TZ, value: Europe/Paris}
            - {name: HAS_EBIKES, value: "true"}
            - {name: COLD_START_DAYS, value: "14"}
            - {name: NEIGHBORHOODS_META_PATH, value: /config/neighborhoods.meta.json}
            - {name: OG_IMAGE_PATH, value: /config/og.png}
            - {name: UMAMI_WEBSITE_ID, value: d46d7d2d-e87c-475b-b8b0-15dbaab38757}
            - {name: DESCRIPTION, value: "Live Vélib' Métropole dock availability and 90-day patterns across the Paris region."}
            - name: AREA_OVERRIDES
              value: '{"paris":"Paris","hauts-de-seine":"Hauts-de-Seine","seine-saint-denis":"Seine-Saint-Denis","val-de-marne":"Val-de-Marne"}'
            - name: DATABASE_URL
              valueFrom: {secretKeyRef: {name: velib-web-db, key: DATABASE_URL}}
          volumeMounts:
            - {name: meta, mountPath: /config/neighborhoods.meta.json, subPath: neighborhoods.meta.json}
            - {name: og, mountPath: /config/og.png, subPath: og.png}
          readinessProbe: {httpGet: {path: /ready, port: 8000}, initialDelaySeconds: 5, periodSeconds: 15}
          livenessProbe: {httpGet: {path: /healthz, port: 8000}, initialDelaySeconds: 10, periodSeconds: 20}
          resources: {requests: {cpu: 25m, memory: 64Mi}, limits: {memory: 256Mi}}
      volumes:
        - {name: meta, configMap: {name: velib-neighborhoods-meta}}
        - {name: og, configMap: {name: velib-og}}
---
apiVersion: v1
kind: Service
metadata: {name: velib-web, namespace: velib, labels: {app: velib-web}}
spec:
  selector: {app: velib-web}
  ports: [{name: http, port: 8000, targetPort: 8000}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velib-web
  namespace: velib
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  ingressClassName: nginx
  rules:
    - host: velib.kardol.us
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: velib-web, port: {number: 8000}}}
