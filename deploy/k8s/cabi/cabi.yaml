# CaBi (Capital Bikeshare, Washington DC region) — full per-city stack, cloned from the
# citibike pattern. DB-per-city: host TimescaleDB cabi-postgres on 10.0.0.120:5439.
# Secrets (cabi-db / cabi-web-db) + ConfigMaps (cabi-neighborhoods{,-meta}, cabi-og) +
# the ghcr-pull imagePullSecret are created out-of-band (see deploy/k8s/cabi/README).
apiVersion: v1
kind: Namespace
metadata:
  name: cabi
  labels:
    kardol.us/group: apps
---
# no-selector Service + Endpoints → host-docker cabi-postgres (:5439)
apiVersion: v1
kind: Service
metadata: {name: cabi-postgres, namespace: cabi}
spec:
  type: ClusterIP
  ports:
    - {name: pg, port: 5432, targetPort: 5439, protocol: TCP}
---
apiVersion: v1
kind: Endpoints
metadata: {name: cabi-postgres, namespace: cabi}
subsets:
  - addresses: [{ip: 10.0.0.120}]
    ports: [{name: pg, port: 5439, protocol: TCP}]
---
# ingester — Capital Bikeshare GBFS → cabi dock_status, neighborhoods from a mounted ConfigMap
apiVersion: apps/v1
kind: Deployment
metadata: {name: dockscan, namespace: cabi, labels: {app: dockscan}}
spec:
  replicas: 1
  selector: {matchLabels: {app: dockscan}}
  template:
    metadata: {labels: {app: dockscan}}
    spec:
      imagePullSecrets: [{name: ghcr-pull}]
      containers:
        - name: dockscan
          image: ghcr.io/kardolus/citi-bike-dock-tracker:v9
          imagePullPolicy: IfNotPresent
          args: ["ts", "--interval", "180", "--postgres", "--metrics-addr", ":2112"]
          ports: [{containerPort: 2112, name: metrics}]
          env:
            - {name: CITY_ID, value: dc}
            - {name: GBFS_STATION_INFORMATION_URL, value: "https://gbfs.lyft.com/gbfs/2.3/dca-cabi/en/station_information.json"}
            - {name: GBFS_STATION_STATUS_URL, value: "https://gbfs.lyft.com/gbfs/2.3/dca-cabi/en/station_status.json"}
            - {name: NEIGHBORHOODS_PATH, value: /config/neighborhoods.json}
            - {name: USER_AGENT, value: "cabi-bikeshare-tracker/1.0 (+https://cabi.kardol.us; unofficial, public GBFS)"}
            - name: DATABASE_URL
              valueFrom: {secretKeyRef: {name: cabi-db, key: DATABASE_URL}}
          volumeMounts:
            - {name: neighborhoods, mountPath: /config/neighborhoods.json, subPath: neighborhoods.json}
          readinessProbe: {httpGet: {path: /ready, port: 2112}, initialDelaySeconds: 10, periodSeconds: 15}
          livenessProbe: {httpGet: {path: /healthz, port: 2112}, initialDelaySeconds: 10, periodSeconds: 20}
          resources: {requests: {cpu: 25m, memory: 32Mi}, limits: {memory: 128Mi}}
      volumes:
        - {name: neighborhoods, configMap: {name: cabi-neighborhoods}}
---
apiVersion: v1
kind: Service
metadata: {name: dockscan, namespace: cabi, labels: {app: dockscan}}
spec:
  selector: {app: dockscan}
  ports: [{name: metrics, port: 2112, targetPort: 2112}]
---
# web — CaBi front-end (reads cabi_ro), meta + og mounted, city config via env
apiVersion: apps/v1
kind: Deployment
metadata: {name: cabi-web, namespace: cabi, labels: {app: cabi-web}}
spec:
  replicas: 1
  selector: {matchLabels: {app: cabi-web}}
  template:
    metadata: {labels: {app: cabi-web}}
    spec:
      imagePullSecrets: [{name: ghcr-pull}]
      containers:
        - name: cabi-web
          image: ghcr.io/kardolus/citibike-web:v58
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8000, name: http}]
          env:
            - {name: CITY_ID, value: dc}
            - {name: BRAND, value: CaBi}
            - {name: DOMAIN, value: cabi.kardol.us}
            - {name: CITY_TZ, value: America/New_York}
            - {name: HAS_EBIKES, value: "true"}
            - {name: COLD_START_DAYS, value: "14"}
            - {name: NEIGHBORHOODS_META_PATH, value: /config/neighborhoods.meta.json}
            - {name: OG_IMAGE_PATH, value: /config/og.png}
            - {name: UMAMI_WEBSITE_ID, value: b1d35a01-31f1-465f-9549-d830d856a84c}
            - {name: DESCRIPTION, value: "Live CaBi (Capital Bikeshare) dock availability and 90-day patterns across the Washington, DC region."}
            - name: AREA_OVERRIDES
              value: '{"washington-dc":"Washington, DC","prince-george-s":"Prince George''s"}'
            - name: DATABASE_URL
              valueFrom: {secretKeyRef: {name: cabi-web-db, key: DATABASE_URL}}
          volumeMounts:
            - {name: meta, mountPath: /config/neighborhoods.meta.json, subPath: neighborhoods.meta.json}
            - {name: og, mountPath: /config/og.png, subPath: og.png}
          readinessProbe: {httpGet: {path: /ready, port: 8000}, initialDelaySeconds: 5, periodSeconds: 15}
          livenessProbe: {httpGet: {path: /healthz, port: 8000}, initialDelaySeconds: 10, periodSeconds: 20}
          resources: {requests: {cpu: 25m, memory: 64Mi}, limits: {memory: 256Mi}}
      volumes:
        - {name: meta, configMap: {name: cabi-neighborhoods-meta}}
        - {name: og, configMap: {name: cabi-og}}
---
apiVersion: v1
kind: Service
metadata: {name: cabi-web, namespace: cabi, labels: {app: cabi-web}}
spec:
  selector: {app: cabi-web}
  ports: [{name: http, port: 8000, targetPort: 8000}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cabi-web
  namespace: cabi
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  ingressClassName: nginx
  rules:
    - host: cabi.kardol.us
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: cabi-web, port: {number: 8000}}}
