# Ecobici (Mexico City) — full per-city stack, cloned from velib.
# DB-per-city: host TimescaleDB ecobici-postgres on 10.0.0.120:5441.
apiVersion: v1
kind: Namespace
metadata: {name: ecobici, labels: {kardol.us/group: apps}}
---
apiVersion: v1
kind: Service
metadata: {name: ecobici-postgres, namespace: ecobici}
spec:
  type: ClusterIP
  ports: [{name: pg, port: 5432, targetPort: 5441, protocol: TCP}]
---
apiVersion: v1
kind: Endpoints
metadata: {name: ecobici-postgres, namespace: ecobici}
subsets:
  - addresses: [{ip: 10.0.0.120}]
    ports: [{name: pg, port: 5441, protocol: TCP}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: dockscan, namespace: ecobici, labels: {app: dockscan}}
spec:
  replicas: 1
  selector: {matchLabels: {app: dockscan}}
  template:
    metadata: {labels: {app: dockscan}}
    spec:
      imagePullSecrets: [{name: ghcr-pull}]
      containers:
        - name: dockscan
          image: ghcr.io/kardolus/citi-bike-dock-tracker:v10
          imagePullPolicy: IfNotPresent
          args: ["ts", "--interval", "180", "--postgres", "--metrics-addr", ":2112"]
          ports: [{containerPort: 2112, name: metrics}]
          env:
            - {name: CITY_ID, value: cdmx}
            - {name: GBFS_STATION_INFORMATION_URL, value: "https://gbfs.mex.lyftbikes.com/gbfs/en/station_information.json"}
            - {name: GBFS_STATION_STATUS_URL, value: "https://gbfs.mex.lyftbikes.com/gbfs/en/station_status.json"}
            - {name: NEIGHBORHOODS_PATH, value: /config/neighborhoods.json}
            - {name: USER_AGENT, value: "ecobici-bikeshare-tracker/1.0 (+https://ecobici.kardol.us; unofficial, public GBFS)"}
            - name: DATABASE_URL
              valueFrom: {secretKeyRef: {name: ecobici-db, key: DATABASE_URL}}
          volumeMounts:
            - {name: neighborhoods, mountPath: /config/neighborhoods.json, subPath: neighborhoods.json}
          readinessProbe: {httpGet: {path: /ready, port: 2112}, initialDelaySeconds: 10, periodSeconds: 15}
          livenessProbe: {httpGet: {path: /healthz, port: 2112}, initialDelaySeconds: 10, periodSeconds: 20}
          resources: {requests: {cpu: 25m, memory: 32Mi}, limits: {memory: 128Mi}}
      volumes:
        - {name: neighborhoods, configMap: {name: ecobici-neighborhoods}}
---
apiVersion: v1
kind: Service
metadata: {name: dockscan, namespace: ecobici, labels: {app: dockscan}}
spec:
  selector: {app: dockscan}
  ports: [{name: metrics, port: 2112, targetPort: 2112}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: ecobici-web, namespace: ecobici, labels: {app: ecobici-web}}
spec:
  replicas: 1
  selector: {matchLabels: {app: ecobici-web}}
  template:
    metadata: {labels: {app: ecobici-web}}
    spec:
      imagePullSecrets: [{name: ghcr-pull}]
      containers:
        - name: ecobici-web
          image: ghcr.io/kardolus/citibike-web:v56
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8000, name: http}]
          env:
            - {name: CITY_ID, value: cdmx}
            - {name: BRAND, value: Ecobici}
            - {name: DOMAIN, value: ecobici.kardol.us}
            - {name: CITY_TZ, value: America/Mexico_City}
            - {name: HAS_EBIKES, value: "false"}                  # feed exposes no e-bike count
            - {name: COLD_START_DAYS, value: "14"}
            - {name: NEIGHBORHOOD_LABEL, value: Colonia}
            - {name: DEFAULT_SCOPE, value: all-ciudad-de-mexico}  # land on the colonia view
            - {name: NEIGHBORHOODS_META_PATH, value: /config/neighborhoods.meta.json}
            - {name: OG_IMAGE_PATH, value: /config/og.png}
            - {name: UMAMI_WEBSITE_ID, value: 5e035066-0434-4789-8f1f-b7920a814e12}
            - {name: DESCRIPTION, value: "Live Ecobici dock availability and 90-day patterns across central Mexico City."}
            - name: AREA_OVERRIDES
              value: '{"ciudad-de-mexico":"Ciudad de México"}'
            - name: DATABASE_URL
              valueFrom: {secretKeyRef: {name: ecobici-web-db, key: DATABASE_URL}}
          volumeMounts:
            - {name: meta, mountPath: /config/neighborhoods.meta.json, subPath: neighborhoods.meta.json}
            - {name: og, mountPath: /config/og.png, subPath: og.png}
          readinessProbe: {httpGet: {path: /ready, port: 8000}, initialDelaySeconds: 5, periodSeconds: 15}
          livenessProbe: {httpGet: {path: /healthz, port: 8000}, initialDelaySeconds: 10, periodSeconds: 20}
          resources: {requests: {cpu: 25m, memory: 64Mi}, limits: {memory: 256Mi}}
      volumes:
        - {name: meta, configMap: {name: ecobici-neighborhoods-meta}}
        - {name: og, configMap: {name: ecobici-og}}
---
apiVersion: v1
kind: Service
metadata: {name: ecobici-web, namespace: ecobici, labels: {app: ecobici-web}}
spec:
  selector: {app: ecobici-web}
  ports: [{name: http, port: 8000, targetPort: 8000}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecobici-web
  namespace: ecobici
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  ingressClassName: nginx
  rules:
    - host: ecobici.kardol.us
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: ecobici-web, port: {number: 8000}}}
